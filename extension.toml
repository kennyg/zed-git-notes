id = "git-notes"
name = "Git Notes"
version = "0.0.2"
schema_version = 1
authors = ["kennyg"]
description = "View git notes (including gh-annotate annotations) inline in the editor"
repository = "https://github.com/kennyg/zed-git-notes"

[language_servers.git-notes-lsp]
name = "Git Notes LSP"
languages = [
  "Astro", "Bash", "C", "C#", "C++", "Clojure", "CSS", "Dart",
  "Dockerfile", "Elixir", "Elm", "Erlang", "GDScript", "Gleam", "Go",
  "GraphQL", "Groovy", "Haskell", "HTML", "Java", "JavaScript", "JSON",
  "Julia", "Kotlin", "Lua", "Makefile", "Markdown", "Nim", "OCaml",
  "PHP", "Plain Text", "PowerShell", "Prisma", "Proto", "PureScript",
  "Python", "R", "Racket", "Ruby", "Rust", "Scala", "SCSS", "Shell",
  "SQL", "Svelte", "Swift", "Terraform", "TOML", "TypeScript", "YAML",
  "XML", "Zig",
]
